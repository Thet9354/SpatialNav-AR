<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B54C0"/>
      <stop offset="1" stop-color="#062663"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.74" r="0.55">
      <stop offset="0" stop-color="#3E8BFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3E8BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CFE6FF"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="760" r="360" fill="url(#glow)"/>

  <!-- Sonar arcs radiating forward from the user -->
  <g fill="none" stroke-linecap="round">
    <path d="M 364.8 675 A 170 170 0 0 1 659.2 675" stroke="#FFFFFF" stroke-width="40" stroke-opacity="1"/>
    <path d="M 252.2 610 A 300 300 0 0 1 771.8 610" stroke="#EAF4FF" stroke-width="36" stroke-opacity="0.78"/>
    <path d="M 139.6 545 A 430 430 0 0 1 884.4 545" stroke="#CFE6FF" stroke-width="32" stroke-opacity="0.52"/>
  </g>

  <!-- The user -->
  <circle cx="512" cy="760" r="52" fill="url(#dot)"/>
</svg>
