# SwiftLint configuration for SpatialNav.
# Install: brew install swiftlint — then add an Xcode run-script build phase
# or run `swiftlint` from the repo root.

included:
  - SpatialNav
  - SpatialNavTests
  - SpatialNavUITests

opt_in_rules:
  - empty_count
  - sorted_first_last
  - closure_spacing
  - contains_over_first_not_nil

line_length:
  warning: 140
  error: 200

identifier_name:
  min_length: 2

nesting:
  type_level: 2
